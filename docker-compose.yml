services:
  game-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "0.0.0.0:80:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
